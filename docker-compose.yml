services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    restart: unless-stopped
    depends_on:
      segment-server:
        condition: service_healthy
      mobilesam:
        condition: service_healthy
    networks:
      - segmentation-network
    security_opt:
      - no-new-privileges:true

  # MobileSAM Gradio Demo Service
  mobilesam:
    build:
      context: ./MobileSAM
      dockerfile: Dockerfile
    image: mobilesam:latest
    container_name: mobilesam
    environment:
      - DEVICE=cpu
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - ./MobileSAM/weights:/app/weights:ro
    networks:
      - segmentation-network

  # FastAPI Segmentation Server
  segment-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: segment-server:latest
    container_name: segment-server
    environment:
      - PORT=8001
      - DEVICE=cpu
      - MOBILESAM_URL=http://mobilesam:7860/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - ./MobileSAM/weights:/app/weights:ro
    networks:
      - segmentation-network
    depends_on:
      mobilesam:
        condition: service_healthy

networks:
  segmentation-network:
    driver: bridge
    name: segmentation-network

volumes:
  nginx-cache: